appId: com.groovecore.app
---
# E2E: Practice tab — open core player, verify controls
- launchApp

# Navigate to Practice tab
- tapOn: "Practice"

# Verify core player elements
- assertVisible:
    id: "bpm-display"
- assertVisible:
    id: "stereo-split-toggle"
- assertVisible:
    id: "transport-stop"
